{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        /* RESET & BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            /* Fullscreen background image */
            background: url("{% static 'main/login.jpg' %}") no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Dark Overlay for better text visibility */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        /* Login Container */
        .login-container {
            position: relative;
            z-index: 1; /* On top of overlay */
            width: 350px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(6px);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            padding: 40px 30px;
            text-align: center;
            opacity: 0;
            transform: translateY(40px);
            animation: fadeInUp 1s forwards ease;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-container h2 {
            font-size: 28px;
            margin-bottom: 25px;
            color: #333;
            animation: slideDown 1s ease forwards;
            transform: translateY(-20px);
            opacity: 0;
            animation-delay: 0.2s; /* Stagger */
        }

        @keyframes slideDown {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-message {
            margin-bottom: 15px;
            color: #e74c3c;
            background: #ffe6e6;
            padding: 10px;
            border-radius: 6px;
            animation: fadeError 0.8s ease-out;
        }

        @keyframes fadeError {
            0% {
                opacity: 0;
                transform: translateY(-10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        form label {
            display: block;
            text-align: left;
            color: #555;
            margin-bottom: 5px;
            margin-top: 15px;
        }

        form input {
            width: 100%;
            padding: 10px 15px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }

        form input:focus {
            border-color: #3498db;
        }

        .submit-button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background: #3498db;
            color: #fff;
            cursor: pointer;
            transition: background 0.3s, transform 0.3s;
        }

        .submit-button:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        /* Responsive adjustments */
        @media (max-width: 400px) {
            .login-container {
                width: 90%;
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Dark overlay for better contrast -->
    <div class="overlay"></div>

    <div class="login-container">
        <h2>Login</h2>

        {% if error %}
            <div class="error-message">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <label>Username:</label>
            <input type="text" name="username" placeholder="Enter username">

            <label>Password:</label>
            <input type="password" name="password" placeholder="Enter password">

            <button type="submit" class="submit-button">Login</button>
        </form>
    </div>
</body>
</html>
